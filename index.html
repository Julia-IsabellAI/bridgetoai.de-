<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Transformation</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[#0B1C24] text-white font-sans">

<!-- HERO -->
<section class="relative min-h-screen flex items-center px-8 lg:px-20">

  <!-- Background Gradient -->
  <div class="absolute inset-0 bg-gradient-to-r from-[#0B1C24] via-[#0B1C24]/90 to-transparent"></div>

  <!-- Content -->
  <div class="relative z-10 max-w-3xl">
    
    <p class="text-sm tracking-widest text-[#00A878] mb-4">
      AI TRANSFORMATION. REAL IMPACT.
    </p>

    <h1 class="text-5xl lg:text-7xl font-semibold leading-tight mb-6">
      Bridging Technology.<br />
      Driving <span class="text-[#00A878]">Transformation.</span>
    </h1>

    <p class="text-lg text-gray-300 mb-8">
      We help organizations turn data, systems and AI into measurable business impact.
    </p>

    <!-- Buttons -->
    <div class="flex gap-4">
      <a href="#" class="bg-[#00A878] hover:bg-[#00996b] px-6 py-3 rounded-lg font-medium transition">
        Our Approach →
      </a>
      <a href="#" class="border border-gray-500 hover:border-white px-6 py-3 rounded-lg transition">
        Let’s Talk →
      </a>
    </div>

    <!-- Services -->
    <div class="flex gap-8 mt-12 text-sm text-gray-400">
      <div>Strategy & Advisory</div>
      <div>AI & Data Solutions</div>
      <div>Implementation & Scale</div>
    </div>

  </div>

  <!-- Right Visual -->
  <div class="absolute right-0 top-0 h-full w-1/2 hidden lg:block">
    <img 
      src="https://images.unsplash.com/photo-1505765050516-f72dcac9c60f?q=80&w=2070" 
      class="object-cover h-full w-full opacity-70"
    />
    <!-- Overlay Gradient -->
    <div class="absolute inset-0 bg-gradient-to-l from-transparent to-[#0B1C24]"></div>
  </div>

</section>

</body>
</html>
